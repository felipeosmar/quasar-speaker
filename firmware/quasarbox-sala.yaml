substitutions:
  device_name: quasarbox-sala
  friendly_name: "QuasarBox Sala"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    board_build.arduino.memory_type: qio_opi

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended

# --- Logging ---
logger:
  level: DEBUG

# --- Wi-Fi ---
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

  ap:
    ssid: "${device_name}"
    password: "quasar2026"

# --- API (conexão com HA) ---
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# --- PSRAM ---
psram:
  mode: octal
  speed: 80MHz

# --- I2S Áudio ---
i2s_audio:
  - id: i2s_mic
    i2s_lrclk_pin: GPIO5   # WS
    i2s_bclk_pin: GPIO4    # SCK

  - id: i2s_spk
    i2s_lrclk_pin: GPIO17  # LRC
    i2s_bclk_pin: GPIO16   # BCLK

# --- Microfone ---
microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_mic
    adc_type: external
    pdm: false
    channel: left
    bits_per_sample: 32bit
    i2s_din_pin: GPIO6

# --- Speaker ---
speaker:
  - platform: i2s_audio
    id: spk
    i2s_audio_id: i2s_spk
    dac_type: external
    i2s_dout_pin: GPIO15
    i2s_mode: primary

# --- LED Ring WS2812B ---
light:
  - platform: esp32_rmt_led_strip
    id: led_ring
    rgb_order: GRB
    chipset: WS2812
    pin: GPIO48
    num_leds: 8
    name: "LED Ring"
    effects:
      - pulse:
          name: "Pulse Blue"
          min_brightness: 20%
          max_brightness: 100%
          transition_length: 500ms
          update_interval: 500ms
      - addressable_rainbow:
          name: "Rainbow"

# --- Amplificador Enable (SD pin do MAX98357A) ---
switch:
  - platform: gpio
    id: amp_enable
    pin: GPIO18
    name: "Amplifier"
    restore_mode: ALWAYS_ON

# --- Wake Word (micro_wake_word no ESP32-S3) ---
micro_wake_word:
  models:
    - model: hey_jarvis
  on_wake_word_detected:
    - light.turn_on:
        id: led_ring
        brightness: 100%
        red: 100%
        green: 100%
        blue: 100%
        effect: none

# --- Voice Assistant ---
voice_assistant:
  microphone: mic
  speaker: spk
  use_wake_word: true
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0

  on_listening:
    - light.turn_on:
        id: led_ring
        brightness: 80%
        red: 0%
        green: 0%
        blue: 100%
        effect: "Pulse Blue"

  on_stt_end:
    - light.turn_on:
        id: led_ring
        brightness: 80%
        red: 100%
        green: 80%
        blue: 0%
        effect: none

  on_tts_start:
    - light.turn_on:
        id: led_ring
        brightness: 80%
        red: 0%
        green: 100%
        blue: 0%
        effect: none

  on_end:
    - light.turn_off:
        id: led_ring

  on_error:
    - light.turn_on:
        id: led_ring
        brightness: 100%
        red: 100%
        green: 0%
        blue: 0%
        effect: none
    - delay: 2s
    - light.turn_off:
        id: led_ring
